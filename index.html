<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>New Transaction</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #F0F4FF;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
    }

    .app {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      background: #F0F4FF;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, #1E40AF, #3B82F6);
      padding: 20px 20px 28px;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .back-btn {
      background: rgba(255,255,255,0.2);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 22px;
      width: 44px;
      height: 44px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .header-title {
      font-size: 26px;
      font-weight: 800;
    }

    /* Card */
    .card {
      margin: -12px 14px 0;
      background: #fff;
      border-radius: 20px;
      padding: 24px 18px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    /* Labels */
    .field-label {
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.1em;
      color: #64748B;
      margin-bottom: 8px;
      display: block;
      text-transform: uppercase;
    }

    /* Inputs */
    input, select, textarea {
      width: 100%;
      font-size: 20px;
      font-weight: 600;
      border: 2px solid #CBD5E1;
      border-radius: 12px;
      padding: 14px 16px;
      background: #fff;
      color: #1E293B;
      outline: none;
      font-family: inherit;
    }
    input:focus, select:focus, textarea:focus {
      border-color: #3B82F6;
    }
    textarea {
      resize: vertical;
      line-height: 1.5;
      font-size: 18px;
    }

    /* Row: two columns */
    .two-col {
      display: flex;
      gap: 14px;
      margin-bottom: 20px;
    }
    .two-col > div { flex: 1; }

    .field-group { margin-bottom: 20px; }

    /* Readonly */
    .readonly {
      background: #F1F5F9 !important;
      color: #64748B !important;
    }

    /* Category grid */
    .category-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .cat-btn {
      background: #F8FAFF;
      border: 2.5px solid #E2E8F0;
      border-radius: 14px;
      padding: 18px 10px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      transition: all 0.15s;
    }
    .cat-btn.active {
      background: #ECFDF5;
      border-color: #10B981;
    }
    .cat-emoji { font-size: 32px; }
    .cat-label {
      font-size: 18px;
      font-weight: 700;
      color: #334155;
      font-family: 'Segoe UI', sans-serif;
    }
    .cat-btn.active .cat-label { color: #059669; }

    /* Items section */
    .items-header {
      display: grid;
      grid-template-columns: 2fr 1fr 0.8fr 1.4fr;
      gap: 8px;
      padding: 0 4px;
      margin-bottom: 10px;
    }
    .items-header span {
      font-size: 13px;
      font-weight: 800;
      color: #94A3B8;
      letter-spacing: 0.08em;
    }

    /* Item row card */
    .item-row {
      background: #F8FAFF;
      border: 2px solid #E2E8F0;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .item-name-input {
      margin-bottom: 12px;
      border-radius: 10px;
      font-size: 20px;
    }
    .item-fields {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }
    .item-fields select {
      flex: 1;
      font-size: 18px;
      border-radius: 10px;
      padding: 12px 10px;
    }
    .item-fields .qty-input {
      width: 80px;
      font-size: 20px;
      font-weight: 700;
      border-radius: 10px;
      padding: 12px 8px;
      text-align: center;
    }
    .item-fields .price-input {
      flex: 1.4;
      font-size: 20px;
      font-weight: 700;
      border-radius: 10px;
      padding: 12px 10px;
    }
    .item-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .item-total {
      font-size: 20px;
      font-weight: 800;
      color: #E53E3E;
    }
    .remove-btn {
      background: #FEE2E2;
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 17px;
      font-weight: 700;
      color: #E53E3E;
      cursor: pointer;
      font-family: inherit;
    }

    /* Add row button */
    .add-row-btn {
      width: 100%;
      background: #EFF6FF;
      border: 2.5px dashed #93C5FD;
      border-radius: 14px;
      padding: 16px;
      font-size: 18px;
      font-weight: 700;
      color: #2563EB;
      cursor: pointer;
      margin-top: 4px;
      font-family: inherit;
    }

    /* Grand Total */
    .grand-total {
      background: linear-gradient(135deg, #1E40AF, #3B82F6);
      border-radius: 14px;
      padding: 18px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 20px 0;
    }
    .grand-total-label {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
    }
    .grand-total-amount {
      font-size: 28px;
      font-weight: 900;
      color: #fff;
    }

    /* Attach box */
    .attach-box {
      border: 2.5px dashed #CBD5E1;
      border-radius: 14px;
      padding: 28px 16px;
      text-align: center;
      background: #F8FAFF;
      cursor: pointer;
      margin-top: 8px;
    }
    .attach-icon { font-size: 36px; margin-bottom: 10px; }
    .attach-text {
      font-size: 17px;
      color: #64748B;
      font-weight: 600;
      margin-bottom: 14px;
    }
    .choose-btn {
      background: #1E40AF;
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 17px;
      font-weight: 700;
      padding: 12px 28px;
      cursor: pointer;
      font-family: inherit;
    }

    /* Save button */
    .save-btn {
      width: 100%;
      background: linear-gradient(135deg, #059669, #10B981);
      border: none;
      border-radius: 16px;
      color: #fff;
      font-size: 22px;
      font-weight: 800;
      padding: 18px;
      cursor: pointer;
      margin-top: 20px;
      letter-spacing: 0.02em;
      box-shadow: 0 4px 16px rgba(16,185,129,0.35);
      font-family: inherit;
    }
    .save-btn:active { opacity: 0.9; transform: scale(0.99); }

    .spacer { height: 32px; }
  </style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <button class="back-btn">‹</button>
    <span class="header-title">New Transaction</span>
  </div>

  <!-- Main Card -->
  <div class="card">

    <!-- Transaction ID + Date -->
    <div class="two-col">
      <div>
        <label class="field-label">Transaction ID</label>
        <input type="text" value="#0005" readonly class="readonly" />
      </div>
      <div>
        <label class="field-label">Date</label>
        <input type="date" id="txn-date" value="2026-05-27" />
      </div>
    </div>

    <!-- Name -->
    <div class="field-group">
      <label class="field-label">Name (Party / Person)</label>
      <input type="text" id="party-name" value="Agri all" placeholder="Enter name..." />
    </div>

    <!-- Category -->
    <div class="field-group">
      <label class="field-label">Category</label>
      <div class="category-grid">
        <button class="cat-btn active" onclick="selectCategory(this, 'product')">
          <span class="cat-emoji">📦</span>
          <span class="cat-label">Product</span>
        </button>
        <button class="cat-btn" onclick="selectCategory(this, 'labour')">
          <span class="cat-emoji">👷</span>
          <span class="cat-label">Labour</span>
        </button>
        <button class="cat-btn" onclick="selectCategory(this, 'transport')">
          <span class="cat-emoji">🚗</span>
          <span class="cat-label">Transport</span>
        </button>
        <button class="cat-btn" onclick="selectCategory(this, 'loading')">
          <span class="cat-emoji">🏗️</span>
          <span class="cat-label">Loading</span>
        </button>
      </div>
    </div>

    <!-- Items -->
    <div class="field-group">
      <label class="field-label">Items</label>
      <div class="items-header">
        <span>ITEM</span>
        <span>UNIT</span>
        <span>QTY</span>
        <span>PRICE</span>
      </div>
      <div id="items-list"></div>
      <button class="add-row-btn" onclick="addItemRow()">+ Add Item Row</button>
    </div>

    <!-- Grand Total -->
    <div class="grand-total">
      <span class="grand-total-label">Grand Total</span>
      <span class="grand-total-amount" id="grand-total">₹0.00</span>
    </div>

    <!-- Note -->
    <div class="field-group">
      <label class="field-label">Note (Optional)</label>
      <textarea id="note" rows="3" placeholder="Additional notes..."></textarea>
    </div>

    <!-- Attach -->
    <div class="field-group">
      <label class="field-label">Attach Bill / Document (Optional)</label>
      <div class="attach-box" onclick="document.getElementById('file-input').click()">
        <div class="attach-icon">📎</div>
        <div class="attach-text">Tap to attach image or PDF</div>
        <button class="choose-btn" onclick="event.stopPropagation(); document.getElementById('file-input').click()">Choose File</button>
        <input type="file" id="file-input" accept="image/*,.pdf" style="display:none" onchange="showFileName(this)" />
        <div id="file-name" style="margin-top:10px; font-size:16px; color:#2563EB; font-weight:600;"></div>
      </div>
    </div>

    <!-- Save -->
    <button class="save-btn" onclick="saveTransaction()">✓ Save Transaction</button>

  </div>
  <div class="spacer"></div>
</div>

<script>
  const unitOptions = ["Unit", "Kg", "Ton", "Litre", "Bag", "Box", "Piece", "Meter"];
  let itemCounter = 0;

  function buildUnitOptions(selected) {
    return unitOptions.map(u =>
      `<option value="${u}" ${u === selected ? 'selected' : ''}>${u}</option>`
    ).join('');
  }

  function addItemRow(name = '', unit = 'Unit', qty = '', price = '') {
    itemCounter++;
    const id = itemCounter;
    const html = `
      <div class="item-row" id="item-${id}">
        <input type="text" class="item-name-input" placeholder="Item name"
               value="${name}" oninput="calcTotal()" />
        <div class="item-fields">
          <select onchange="calcTotal()">${buildUnitOptions(unit)}</select>
          <input type="number" class="qty-input" placeholder="Qty"
                 value="${qty}" min="0" oninput="calcRowTotal(${id})" />
          <input type="number" class="price-input" placeholder="Price"
                 value="${price}" min="0" oninput="calcRowTotal(${id})" />
        </div>
        <div class="item-footer">
          <span class="item-total" id="row-total-${id}">₹0.00</span>
          <button class="remove-btn" onclick="removeRow(${id})">✕ Remove</button>
        </div>
      </div>`;
    document.getElementById('items-list').insertAdjacentHTML('beforeend', html);
    calcRowTotal(id);
  }

  function calcRowTotal(id) {
    const row = document.getElementById(`item-${id}`);
    if (!row) return;
    const qty = parseFloat(row.querySelector('.qty-input').value) || 0;
    const price = parseFloat(row.querySelector('.price-input').value) || 0;
    row.querySelector(`#row-total-${id}`).textContent = '₹' + (qty * price).toFixed(2);
    calcGrandTotal();
  }

  function calcTotal() { calcGrandTotal(); }

  function calcGrandTotal() {
    let total = 0;
    document.querySelectorAll('.item-row').forEach(row => {
      const qty = parseFloat(row.querySelector('.qty-input').value) || 0;
      const price = parseFloat(row.querySelector('.price-input').value) || 0;
      total += qty * price;
    });
    document.getElementById('grand-total').textContent = '₹' + total.toFixed(2);
  }

  function removeRow(id) {
    const row = document.getElementById(`item-${id}`);
    if (row) row.remove();
    calcGrandTotal();
  }

  function selectCategory(btn, cat) {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  function showFileName(input) {
    const name = input.files[0] ? input.files[0].name : '';
    document.getElementById('file-name').textContent = name;
  }

  function saveTransaction() {
    const name = document.getElementById('party-name').value.trim();
    if (!name) { alert('Please enter a name.'); return; }
    alert('Transaction saved successfully! ✓');
  }

  // Init with one empty row
  addItemRow();
</script>
</body>
</html>
